[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.setuptools"]

[phases.build]
cmds = ["python3.11 -m ensurepip --upgrade", "python3.11 -m pip install --upgrade pip", "python3.11 -m pip install -r requirements.txt"]

[start]
cmd = "python3.11 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"